<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoLogix AI | Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0B0E15 0%, #1a1f2e 100%);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .loading-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #intro-video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .skip-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(210, 255, 5, 0.1);
            border: 1px solid rgba(210, 255, 5, 0.5);
            color: #d2ff05;
            padding: 0.75rem 1.5rem;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s;
            z-index: 100;
            border-radius: 4px;
        }

        .skip-btn:hover {
            background: rgba(210, 255, 5, 0.2);
            border-color: #d2ff05;
            transform: translateY(-2px);
        }

        .loading-text {
            position: fixed;
            bottom: 30px;
            left: 30px;
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .loading-fallback {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loading-logo {
            width: 120px;
            height: 120px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(210, 255, 5, 0.1);
            border: 2px solid rgba(210, 255, 5, 0.3);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        .loading-logo::before {
            content: 'GeoLogix';
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            color: #d2ff05;
            text-transform: uppercase;
            letter-spacing: -0.05em;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(210, 255, 5, 0.2);
            border-top: 3px solid #d2ff05;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div class="loading-container">
        <video id="intro-video" autoplay muted>
            <source src="loading/GeoLogix Intro.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="loading-fallback">
            <div class="loading-logo"></div>
            <div class="loading-spinner"></div>
        </div>
    </div>

    <span class="loading-text">Initializing GeoLogix AI...</span>
    <button class="skip-btn" onclick="enterApp()">Skip Intro</button>

    <script>
        const video = document.getElementById('intro-video');
        const fallback = document.querySelector('.loading-fallback');

        // Show fallback if video fails to load
        video.addEventListener('error', function() {
            video.style.display = 'none';
            fallback.style.display = 'flex';
            setTimeout(enterApp, 3000);
        });

        // When video ends, redirect to Copilot UI
        video.addEventListener('ended', function() {
            enterApp();
        });

        // Skip button / manual entry
        function enterApp() {
            window.location.href = 'variant-6-copilot.html';
        }

        // Also allow keyboard shortcuts to skip
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ' || e.key === 'Escape') {
                enterApp();
            }
        });

        // Fallback timeout in case video doesn't play
        setTimeout(() => {
            if (!video.ended) {
                video.style.display = 'none';
                fallback.style.display = 'flex';
            }
        }, 2000);
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoLogix AI | Minimal</title>
    <link rel="stylesheet" href="styles/variant-1.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@800&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Ultra minimal: just logo, chat, input -->
    <div class="minimal-container">
        
        <!-- Subtle header -->
        <header class="minimal-header">
            <span class="minimal-logo">GEOLOGIX<span class="accent">AI</span></span>
            <div class="status-dot" title="System Online"></div>
        </header>

        <!-- Chat display -->
        <div class="chat-area" id="chat-display">
            <div class="message ai-message">
                <div class="msg-content">
                    GeoLogix AI ready. Ask me anything.
                </div>
            </div>
        </div>

        <!-- Input area -->
        <div class="input-container">
            <div class="input-wrapper">
                <button class="icon-btn voice-btn" id="voice-btn" title="Voice Input">🎙️</button>
                <input type="text" class="minimal-input" id="user-input" placeholder="Type your question..." autocomplete="off">
                <button class="icon-btn upload-btn" id="upload-btn" title="Upload File">📎</button>
                <button class="send-btn" id="send-btn">→</button>
            </div>
        </div>

        <!-- Hidden file input -->
        <input type="file" id="file-input" style="display: none;" accept=".pdf,.doc,.docx,.txt,.csv,.xlsx,.png,.jpg,.jpeg">
    </div>

    <script src="scripts/shared-utils.js"></script>
    <script src="scripts/variant-1.js"></script>
</body>

</html>
